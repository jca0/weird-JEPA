_target_: model.jepa.JEPA

encoder:
  _target_: model.module.MobileNetEncoder
  embed_dim: ${embed_dim}
  pretrained: true

predictor:
  _target_: model.module.GRUPredictor
  input_dim: ${embed_dim}
  hidden_dim: ${embed_dim}
  output_dim: ${embed_dim}
  num_layers: 2
  dropout: 0.1

action_encoder:
  _target_: model.module.Embedder
  input_dim: ???
  emb_dim: ${embed_dim}

projector:
  _target_: model.module.MLP
  input_dim: ${embed_dim}
  output_dim: ${embed_dim}
  hidden_dim: 2048
  norm_fn:
    _target_: torch.nn.BatchNorm1d
    _partial_: true

pred_proj:
  _target_: model.module.MLP
  input_dim: ${embed_dim}
  output_dim: ${embed_dim}
  hidden_dim: 2048
  norm_fn:
    _target_: torch.nn.BatchNorm1d
    _partial_: true
